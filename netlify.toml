# ============================================================
# Netlify Configuration — Performance & Security
# ============================================================

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# ── Netlify Next.js plugin (SSR + ISR on Netlify) ────────────
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ============================================================
# Asset Optimisation — Brotli/Gzip (Netlify handles this
# automatically for text assets; these headers confirm intent)
# ============================================================

# ── Immutable static chunks (1 year) ─────────────────────────
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Images ───────────────────────────────────────────────────
[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "*.avif"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

# ── SVGs ─────────────────────────────────────────────────────
[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# ── Fonts ────────────────────────────────────────────────────
[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── PDF (CV download) ─────────────────────────────────────────
[[headers]]
  for = "*.pdf"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ============================================================
# Security Headers — all routes
# ============================================================

[[headers]]
  for = "/*"
  [headers.values]
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"
    # Block clickjacking
    X-Frame-Options = "SAMEORIGIN"
    # XSS protection (legacy browsers)
    X-XSS-Protection = "1; mode=block"
    # HTTPS only (1 year)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Control referrer information
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Restrict browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # Content Security Policy
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none';"
