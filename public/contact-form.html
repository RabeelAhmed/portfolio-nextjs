<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Contact Form</title>
  </head>
  <body>
    <!--
      This file exists solely so Netlify can detect the "contact" form at build time.
      Next.js JSX is not parsed by Netlify's post-processing step, so a plain HTML
      form with matching field names is required for Netlify Forms to work.

      IMPORTANT: Do NOT add the `hidden` attribute to the <form> tag — Netlify's
      build-time parser skips elements with `hidden` and will not register the form.
      We use CSS (visibility:hidden / height:0) to hide it from users instead.
    -->
    <form
      name="contact"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
      style="display:none"
    >
      <input type="hidden" name="form-name" value="contact" />
      <input type="hidden" name="bot-field" />
      <input type="text"   name="name"     />
      <input type="email"  name="email"    />
      <textarea            name="message"  ></textarea>
      <button type="submit">Send</button>
    </form>
  </body>
</html>
